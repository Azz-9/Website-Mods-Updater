<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title>Recherche de mods</title>
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/search.css">
	<script src="javascript/search.js"></script>
	<script src="javascript/indexedDBManager.js"></script>
	<script src="javascript/mod.js"></script>
</head>
<body>
<header>
	<h1>Recherche de Mods</h1>
	<nav>
		<a href="index.html">Accueil</a>
		<a href="search.html" class="active">Recherche</a>
		<a href="logs.html">Historique</a>
	</nav>
</header>

<main>
	<section id="filters-section">
		<div>
			<input type="checkbox" id="hide-saved-mods" style="display: none;"
			       onchange="onAnyParameterChange(); search();">
			<label for="hide-saved-mods">Cacher les mods enregistrés</label>
		</div>
		<div class="filter" id="game-version-filter">
			<button>
				<span>Version du jeu</span>
				<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
					<path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/>
				</svg>
			</button>
			<ol>
			</ol>
		</div>
		<div class="filter" id="loader-filter">
			<button>
				<span>Loader</span>
				<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
					<path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/>
				</svg>
			</button>
			<ol>
			</ol>
		</div>
		<div class="filter" id="tags-filter">
			<button>
				<span>Catégories</span>
				<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
					<path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/>
				</svg>
			</button>
			<ol>
			</ol>
		</div>
		<div class="filter" id="environment-filter">
			<button>
				<span>Environement</span>
				<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
					<path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/>
				</svg>
			</button>
			<ol>
				<li data-value="client">Client</li>
				<li data-value="server">Serveur</li>
			</ol>
		</div>
	</section>
	<div>
		<section id="search-section">
			<div id="search-input-container">
				<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
					<path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
				</svg>
				<input type="text" id="search-input" placeholder="Rechercher un mod..." oninput="onSearchInputChange()">
				<button id="search-btn" class="main-btn" onclick="search()">
					<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
						<path d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
					</svg>
					Rechercher
				</button>
			</div>
			<div>
				<div>
					<label for="sort-by">Trier par:</label>
					<select id="sort-by" onchange="onSortSelectChange()">
						<option value="relevance" selected>Pertinence</option>
						<option value="downloads">Téléchargements</option>
						<option value="follows">Abonnés</option>
						<option value="newest">Date de publication</option>
						<option value="updated">Date de mise à jour</option>
					</select>
				</div>
				<div>
					<label for="view">Vue:</label>
					<select id="view" onchange="onLimitSelectChange()">
						<option value="5">5</option>
						<option value="10">10</option>
						<option value="15">15</option>
						<option value="20" selected>20</option>
						<option value="50">50</option>
						<option value="100">100</option>
					</select>
				</div>
				<div class="pagination">
					<button aria-label="Previous page" onclick="onPaginationClick(-1)">
						<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
							<path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z"/>
						</svg>
					</button>
					<span>1</span>
					<button aria-label="Next page" onclick="onPaginationClick(1)">
						<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
							<path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/>
						</svg>
					</button>
				</div>
			</div>
		</section>

		<section id="results">
			<ul id="results-container">
				<!-- Résultats de recherche -->
				<template id="mod-template">
					<li>
						<div>
							<a class="link" href="" target="_blank">
								<img loading="lazy" class="thumbnail" src="" alt="">
							</a>
							<div>
								<div class="header">
									<a href="" class="link" target="_blank">
										<h3 class="title"></h3>
									</a>
									<h4 class="author"></h4>
								</div>
								<p class="description"></p>
								<ul class="tags">

								</ul>
							</div>
							<div class="right-info">
								<div>
									<span class="value downloads"></span>
									<span>downloads</span>
								</div>
								<div>
									<span class="value followers"></span>
									<span>followers</span>
								</div>
								<button class="main-btn add">
									<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
									     width="24px">
										<path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/>
									</svg>
									Ajouter ce mod
								</button>
							</div>
						</div>
					</li>
				</template>
			</ul>
			<div id="loading">
				<div id="loading-square"></div>
				<span id="loading-text">Chargement...</span>
			</div>
		</section>
		<section id="pagination-section" style="display: none;">
			<div class="pagination">
				<button aria-label="Previous page"
				        onclick="onPaginationClick(-1); window.scrollTo({top: 0, behavior: 'smooth'});">
					<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
						<path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z"/>
					</svg>
				</button>
				<span>1</span>
				<button aria-label="Next page"
				        onclick="onPaginationClick(1); window.scrollTo({top: 0, behavior: 'smooth'});">
					<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px">
						<path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"/>
					</svg>
				</button>
			</div>
		</section>
	</div>
</main>
</body>
</html>
